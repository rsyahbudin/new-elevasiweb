# Nginx — contoh untuk Hostinger VPS (PHP-FPM + Laravel public/)
# Sesuaikan: server_name, root, socket PHP-FPM, dan SSL (Certbot).

server {
    listen 80;
    listen [::]:80;
    server_name elevasidesignbuild.com www.elevasidesignbuild.com;
    return 301 https://elevasidesignbuild.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name elevasidesignbuild.com www.elevasidesignbuild.com;

    # ssl_certificate     /etc/letsencrypt/live/elevasidesignbuild.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/elevasidesignbuild.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /home/uXXXXX/domains/elevasidesignbuild.com/public_html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Sesuaikan versi PHP di VPS, contoh:
        # fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_hide_header X-Powered-By;
    }

    # Livewire/Filament — jangan diarahkan ke static .js handler
    location ^~ /livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }
}
